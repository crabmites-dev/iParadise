<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - iParadise</title>
    <style>
        :root {
            --primary-blue: #007aff;
            --bg-light: #f5f5f7;
            --text-dark: #1d1d1f;
            --text-gray: #86868b;
            --border-color: #d2d2d7;
            --required-red: #ff3b30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 420px;
            text-align: center;
            align-self: flex-start;
        }

        .logo { font-size: 45px; margin-bottom: 15px; color: var(--primary-blue); }
        h2 { font-size: 24px; color: var(--text-dark); font-weight: 600; margin-bottom: 8px; }
        p.subtitle { color: var(--text-gray); font-size: 14px; margin-bottom: 30px; line-height: 1.4; }

        .input-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-dark); }
        .required { color: var(--required-red); margin-left: 2px; }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s ease;
        }

        input:focus { outline: none; border-color: var(--primary-blue); }

        .btn-submit {
            background: var(--primary-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover { background: #0063cc; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo"></div>
    <h2>Rejoindre iParadise</h2>
    <p class="subtitle">Créez votre compte en un instant.</p>

    <form id="monFormulaire">
        <div class="input-group">
            <label>Prénom <span class="required">*</span></label>
            <input type="text" id="prenom" placeholder="Prenom" required>
        </div>

        <div class="input-group">
            <label>Nom <span class="required">*</span></label>
            <input type="text" id="nom" placeholder="Nom" required>
        </div>

        <div class="input-group">
            <label>Email <span class="required">*</span></label>
            <input type="email" id="email" placeholder="votre@email.com" required>
        </div>

        <div class="input-group">
            <label>Téléphone</label>
            <input type="tel" placeholder="06...">
        </div>

        <div class="input-group">
            <label>Mot de passe</label>
            <input type="password" placeholder="••••••••" required>
        </div>

        <div class="input-group">
            <label>Confirmer</label>
            <input type="password" placeholder="••••••••" required>
        </div>

        <button type="button" onclick="validerEtRediriger()" class="btn-submit">
            S'inscrire <span>➔</span>
        </button>
    </form>
</div>

<script>
    function validerEtRediriger() {
        const prenom = document.getElementById('prenom').value;
        const nom = document.getElementById('nom').value;
        const email = document.getElementById('email').value;

        if (prenom === "" || nom === "" || email === "") {
        } else {
            window.location.href = "page1.html";
        }
    }
</script>

</body>
</html>
